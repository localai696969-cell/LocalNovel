name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Giải nén code đã upload
        run: unzip truong_thien_flutter.zip -d extracted

      - name: Sinh khung project Flutter đầy đủ (android/, ios/...)
        run: flutter create --org com.truongthien --project-name truong_thien scaffold

      - name: Nâng compileSdk lên 36 (thử mọi biến thể cú pháp có thể)
        run: |
          find scaffold/android -type f \( -name "build.gradle" -o -name "build.gradle.kts" \) -print0 | xargs -0 sed -i -E \
            -e 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 36/' \
            -e 's/compileSdkVersion = flutter\.compileSdkVersion/compileSdkVersion = 36/' \
            -e 's/compileSdk = flutter\.compileSdkVersion/compileSdk = 36/' \
            -e 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/'

      - name: Kiểm tra compileSdk đã đổi thành công chưa
        run: grep -r "compileSdk" scaffold/android/app/build.gradle* scaffold/android/build.gradle* 2>/dev/null || true

      - name: Ghép code Dart đã viết vào khung vừa sinh
        run: |
          rm -rf scaffold/lib
          cp -r extracted/truong_thien/lib scaffold/lib
          cp extracted/truong_thien/pubspec.yaml scaffold/pubspec.yaml

      - name: Thêm quyền Internet cho Android
        run: sed -i 's#<application#<uses-permission android:name="android.permission.INTERNET"/><application#' scaffold/android/app/src/main/AndroidManifest.xml

      - name: Cài thư viện
        working-directory: scaffold
        run: flutter pub get

      - name: Tăng bộ nhớ ảo để tránh hết RAM khi build
        run: |
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Build APK
        working-directory: scaffold
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: truong-thien-apk
          path: scaffold/build/app/outputs/flutter-apk/app-release.apk
