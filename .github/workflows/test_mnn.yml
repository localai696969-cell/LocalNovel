name: Build MNN Chat (feasibility test)
# MỤC ĐÍCH: build thử NGUYÊN BẢN app "MNN Chat" của Alibaba (chưa sửa gì)
# để xác nhận: (1) build có chạy được trên GitHub Actions không,
# (2) APK ra có cài/chạy được trên Zenfone 8 không, (3) tốc độ CPU/GPU/QNN
# thật trên máy bạn ra sao — TRƯỚC KHI bỏ công tích hợp vào LocalNovel.
# Nếu bước này thất bại hoặc quá nặng cho máy ảo miễn phí của GitHub,
# ta biết ngay mà không mất công sửa app chính trước.
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone kho mã nguồn chính thức của Alibaba (không phải fork/sửa)
        run: git clone --depth 1 https://github.com/alibaba/MNN.git

      - name: Cài NDK mới nhất có sẵn (NDK 21 trong README của MNN đã lỗi thời — clang của nó không hỗ trợ tập lệnh SVE2 mà KleidiAI cần, gây lỗi "does not support -march=...+sve2")
        run: |
          NEWEST_NDK=$(yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | grep -oE "ndk;[0-9.]+" | sort -t';' -k2 -V | tail -1)
          echo "Dùng NDK: $NEWEST_NDK"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "$NEWEST_NDK"
          NDK_VERSION=$(echo "$NEWEST_NDK" | cut -d';' -f2)
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV

      - name: Tăng bộ nhớ ảo để tránh hết RAM khi build C++ nặng
        run: |
          sudo swapoff -a
          sudo fallocate -l 12G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      # Đây là đúng nguyên văn lệnh build thư viện native trong README
      # chính thức của MNN — không đoán cờ CMake, dùng lại y hệt.
      - name: Build thư viện MNN native (bật LLM + OpenCL cho GPU)
        working-directory: MNN/project/android
        run: |
          mkdir build_64
          cd build_64
          ../build_64.sh "-DMNN_LOW_MEMORY=true -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true -DMNN_BUILD_LLM=true -DMNN_SUPPORT_TRANSFORMER_FUSE=true -DMNN_ARM82=true -DMNN_USE_LOGCAT=true -DMNN_OPENCL=true -DMNN_SEP_BUILD=OFF -DCMAKE_INSTALL_PREFIX=."
          make install

      - name: Xem cấu trúc thư mục app MnnLlmChat (để đối chiếu nếu bước sau lỗi)
        run: find MNN/apps/Android/MnnLlmChat -maxdepth 2

      # Dùng bản debug thay vì release: mã nguồn công khai của MNN không
      # kèm khóa ký (signing key) riêng của Alibaba, nên bản release build
      # ra sẽ KHÔNG CÓ CHỮ KÝ (app-release-unsigned.apk) — Android luôn từ
      # chối cài loại này, báo đúng lỗi "gói có vẻ không hợp lệ". Bản debug
      # được Gradle tự động ký bằng khóa debug mặc định, luôn cài được —
      # đủ dùng cho mục đích test tốc độ/khả thi ở bước này.
      - name: Build APK debug (release build sẽ không có chữ ký, không cài được)
        working-directory: MNN/apps/Android/MnnLlmChat
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Tìm file APK vừa build ra (đường dẫn thật có thể khác, in ra để xác nhận)
        run: find MNN/apps/Android/MnnLlmChat -name "*.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: MnnLlmChat-original-apk
          path: MNN/apps/Android/MnnLlmChat/**/*-debug.apk
